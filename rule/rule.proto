syntax = "proto3";
package rule;

option go_package = "github.com/phi42/ad-enforcement-tool/rule";

enum InvocationMode {
  MODE_UNSPECIFIED = 0;
  MODE_COMPILE = 1;
  MODE_VERIFY = 2;
}

message SpecIR {
  string output_dir = 1;
  AdrIR adr = 2;
  repeated SelectorIR selectors = 3;
  repeated RuleIR rules = 4;
  InvocationMode mode = 16;
}

message AdrIR {
  string id = 1;
  string title = 2;
}

enum SelectorKind {
  SELECTOR_UNSPECIFIED = 0;
  SELECTOR_COMPONENT = 4;
  SELECTOR_CLASS = 5;
  SELECTOR_INTERFACE = 6;
  SELECTOR_PATH = 7;
}

message SelectorIR {
  string name = 1;
  string pattern = 2;              // package/namespace root or glob pattern
  SelectorKind kind = 3;
}

enum RuleKind {
  RULE_UNSPECIFIED = 0;
  RULE_DEPEND_ONLY = 1;          // "must only depend on"
  RULE_NOT_DEPEND = 2;           // "must not depend on"
  RULE_ANNOTATE = 3;              // "must be annotated with"
  RULE_NOT_ANNOTATE = 4;          // "must not be annotated with"
  RULE_EXTEND = 5;                // "must extend class"
  RULE_NOT_EXTEND = 6;            // "must not extend class"
  RULE_IMPLEMENT = 7;             // "must implement interface"
  RULE_NOT_IMPLEMENT = 8;         // "must not implement interface"
  RULE_ACCESSED_BY = 9;          // "must only be accessed by"
  RULE_ACYCLIC = 10;              // "must be acyclic"
  RULE_IN = 11;                  // "must be in"
  RULE_NOT_IN = 12;              // "must not be in"
  RULE_MATCH = 13;               // "must match"
  RULE_NOT_MATCH = 14;           // "must not match"
  RULE_VISIBILITY = 15;           // "must be public/internal/private"
  RULE_TYPE_CONSTRAINT = 16;      // "must be abstract/sealed/static"
}

enum Visibility {
  VISIBILITY_UNSPECIFIED = 0;
  VISIBILITY_PUBLIC = 1;
  VISIBILITY_INTERNAL = 2;
  VISIBILITY_PRIVATE = 3;
}

enum TypeConstraint {
  TYPE_UNSPECIFIED = 0;
  TYPE_ABSTRACT = 1;
  TYPE_SEALED = 2;
  TYPE_STATIC = 3;
}

message RuleIR {
  string name = 1;
  RuleKind kind = 2;
  string subject = 3;
  repeated string targets = 4;
  string pattern = 5;
  repeated string excludes = 6;
  bool is_error = 7;
  Visibility visibility = 8;
  TypeConstraint type_constraint = 9;
  bool is_custom_rule = 10;
  string raw_body = 11;
}
