syntax = "proto3";
package rule;

option go_package = "github.com/phi42/ad-enforcement-tool/rule";

enum InvocationMode {
  MODE_UNSPECIFIED = 0;
  MODE_COMPILE = 1;
  MODE_VERIFY = 2;
}

message SpecIR {
  reserved 1;
  reserved "output_dir";
  AdrIR adr = 2;
  repeated SelectorIR selectors = 3;
  repeated RuleIR rules = 4;
  InvocationMode mode = 16;
  map<string, string> plugin_config = 17;
}

message AdrIR {
  string id = 1;
  string title = 2;
}

enum SelectorKind {
  SELECTOR_UNSPECIFIED = 0;
  SELECTOR_COMPONENT = 4;
  SELECTOR_CLASS = 5;
  SELECTOR_INTERFACE = 6;
  SELECTOR_PATH = 7;
}

message SelectorIR {
  string name = 1;
  string pattern = 2;
  SelectorKind kind = 3;
}

enum RuleKind {
  RULE_UNSPECIFIED = 0;
  RULE_DEPEND_ONLY = 1;
  RULE_NOT_DEPEND = 2;
  RULE_ANNOTATE = 3;
  RULE_NOT_ANNOTATE = 4;
  RULE_EXTEND = 5;
  RULE_NOT_EXTEND = 6;
  RULE_IMPLEMENT = 7;
  RULE_NOT_IMPLEMENT = 8;
  RULE_ACCESSED_BY = 9;
  RULE_ACYCLIC = 10;
  RULE_IN = 11;
  RULE_NOT_IN = 12;
  RULE_MATCH = 13;
  RULE_NOT_MATCH = 14;
  RULE_VISIBILITY = 15;
  RULE_TYPE_CONSTRAINT = 16;
}

enum Visibility {
  VISIBILITY_UNSPECIFIED = 0;
  VISIBILITY_PUBLIC = 1;
  VISIBILITY_INTERNAL = 2;
  VISIBILITY_PRIVATE = 3;
}

enum TypeConstraint {
  TYPE_CONSTRAINT_UNSPECIFIED = 0;
  TYPE_CONSTRAINT_ABSTRACT = 1;
  TYPE_CONSTRAINT_SEALED = 2;
  TYPE_CONSTRAINT_STATIC = 3;
}

enum Severity {
  SEVERITY_UNSPECIFIED = 0;
  SEVERITY_WARNING = 2;
  SEVERITY_ERROR = 3;
}

enum ExcludeKind {
  EXCLUDE_UNSPECIFIED = 0;
  EXCLUDE_IMPLEMENT_INTERFACE = 3;
  EXCLUDE_CLASS = 4;
  EXCLUDE_COMPONENT = 5;
}

enum CheckKind {
  CHECK_UNSPECIFIED = 0;
  CHECK_FS_MUST_EXIST = 1;
  CHECK_FS_MUST_NOT_EXIST = 2;
  CHECK_FS_MUST_CONTAIN = 3;
  CHECK_FS_MUST_NOT_CONTAIN = 4;
}

message ExclusionIR {
  ExcludeKind kind = 1;
  string value = 2;
}

message TargetRefIR {
  string value = 1;
  bool is_inline = 2;
  SelectorKind type = 3;
  bool is_match = 4;
  TargetRefIR scope = 5;
}

message RuleIR {
  string name = 1;
  RuleKind kind = 2;
  TargetRefIR from = 8;
  repeated TargetRefIR targets = 9;
  Severity severity = 5;
  repeated ExclusionIR excludes = 6;
  repeated CheckIR checks = 7;
  Visibility visibility = 10;
  TypeConstraint type_constraint = 11;
  bool is_file_rule = 12;
  bool is_custom_rule = 13;
  string raw_body = 15;
}

message CheckIR {
  CheckKind kind = 1;
  string path = 2;
  string pattern = 3;
}

